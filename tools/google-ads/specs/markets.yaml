# Multi-market campaign generation matrix.
# Strategy remains editable here; scripts/generate_market_specs.py renders EN/ES specs.
#
# All generated campaigns remain PAUSED. "overlap_group" means only one campaign in
# that group should launch at a time unless geo targets are made mutually exclusive.

version: 1
base_templates:
  en: bakersfield-en.yaml
  es: bakersfield-es.yaml

defaults:
  conversion_action_ids:
    - "7569909838"  # ELA | Lead | HubSpot Form Submit (rename in Ads UI)
  conversion_goal_name: "ELA | Goals | Nonbrand Search"
  conversion_policy: specs/shared/conversion-goals-locked.yaml
  location_presence_only: true
  languages:
    en: 1000
    es: 1003
  status: PAUSED
  channel: SEARCH
  search_partners: false
  display_network: false
  brand_lane_owner: external_agency
  internal_campaign_type: nonbrand
  bidding_strategy: MAXIMIZE_CLICKS

markets:
  - city: Bakersfield
    slug: bakersfield
    priority: 1
    landing_page_status: active
    geo_strategy: county
    geo_target_ids: [9057133]
    geo_target_names:
      - "Kern County, California, United States"
    service_area_notes: "Bakersfield metro plus surrounding Kern County communities."
    overlap_group: kern-county

  - city: Fresno
    slug: fresno
    priority: 2
    landing_page_status: generated_needs_qa
    geo_strategy: county
    geo_target_ids: [9057128]
    geo_target_names:
      - "Fresno County, California, United States"
    service_area_notes: "Fresno metro and broader Fresno County."
    overlap_group: fresno-county

  - city: Stockton
    slug: stockton
    priority: 3
    landing_page_status: generated_needs_qa
    geo_strategy: county
    geo_target_ids: [9057156]
    geo_target_names:
      - "San Joaquin County, California, United States"
    service_area_notes: "Stockton and surrounding San Joaquin County."
    overlap_group: san-joaquin-county

  - city: Modesto
    slug: modesto
