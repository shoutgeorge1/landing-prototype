  - Import keywords from output/negative_keywords_upload_en.csv and output/negative_keywords_upload_es.csv.
  - Attach lists per attach_to_en_campaigns / attach_to_es_campaigns.
  - Re-run scripts/check_negative_conflicts.py before any campaign goes live.
