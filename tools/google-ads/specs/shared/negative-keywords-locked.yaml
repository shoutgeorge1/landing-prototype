version: 1
status: LOCKED
locked_at: "2026-07-15"

decisions:
  A_brand_negatives_on_nonbrand: true
  B_block_pro_bono_legal_aid: true
  C_workers_comp_negatives: hold_post_launch
  D_ad_group_cross_negatives: skip_at_launch
  E_spanish_attachment: es_specific_plus_en_employer_diy

policy:
  match_types_allowed: [PHRASE, EXACT]
  broad_negatives: forbidden
  do_not_block:
    - free consultation
    - free case review
    - bare eeoc / dlse / labor commissioner (lawyer-intent may remain)
    - workers compensation case-intent (hold WC-only DIY until Step C revisited)
    - legitimate employee-side employment law queries
  review_search_terms_after_days: 14

