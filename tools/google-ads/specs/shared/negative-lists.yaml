# ELA non-brand Search — shared negative keyword lists
# Account: EMPLOYMENT LAW ASSIST APC (6769947952)
#
# Design goals:
# - Human judgment, not a dump of every possible exclusion
# - Phrase-first (blocks variants) with selective exact for precision
# - Tiered: launch vs post-launch tuning
# - Safe with a keyword-heavy account — avoids broad traps like "free" or "what is"
#
# Apply as Google Ads shared negative keyword lists, then attach to all
# ELA non-brand Search campaigns (EN + ES). Review conflicts before apply.

version: 2
status: LOCKED
locked_at: "2026-07-15"
locked_policy: specs/shared/negative-keywords-locked.yaml
account_id: "6769947952"

